<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
        
<header>
    <h1>Elementos Químicos</h1>
    <p>Clasificación, grupos, periodos y propiedades</p>
</header>

<nav class="menu">
    <a href="index.html">Inicio</a>
    <a href="teoria.html">Teoría</a>
    <a href="tabla.html">Tabla Interactiva</a>
    <a href="juego.html">Juego</a>
</nav>

<section class="juego">

    <!-- ================= TRIVIA ================= -->

    <div class="juego-container" id="contenedorTrivia">

        <div class="pantalla-inicio" id="pantallaInicio">
            <h2>Trivia</h2><br>
            <button class="btn-principal" onclick="iniciarJuego()">Comenzar</button>
        </div>

        <div class="pantalla-juego oculto" id="pantallaJuego">

            <div class="barra-contenedor">
                <div class="barra-progreso" id="barraProgreso"></div>
            </div>

            <p class="contador" id="contador"></p>

            <h3 id="pregunta"></h3>

            <div id="opciones" class="opciones"></div>

        </div>

    </div>

    <!-- ================= MEMORAMA ================= -->

    <div class="juego-container" id="contenedorMemorama">

        <div class="pantalla-inicio" id="inicioMemorama">
            <h2>Memorama Químico</h2><br>
            <button class="btn-principal" onclick="iniciarMemorama()">Comenzar</button>
        </div>

        <div class="pantalla-juego oculto" id="juegoMemorama">
            <div id="tablero" class="tablero"></div>

            <!-- Contenedor para mensaje final -->
            <div id="mensajeFinalMemorama"></div>
        </div>

    </div>

</section>

<!-- ================= SCRIPTS ================= -->

<script src="data/elementos.js"></script>
<script src="js/juego.js"></script>
<script src="js/memorama.js"></script>

</body>
</html>
